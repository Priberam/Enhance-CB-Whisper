# pytorch_lightning==1.9.5
seed_everything: 123
trainer:
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 32-true
  logger:
    class_path: pytorch_lightning.loggers.MLFlowLogger
    init_args:
      run_name: LEF-acl
      experiment_name: kws-dimensionality_reduction
      tracking_uri: [URL]
      tags:
        projection_type: LEF-acl
  callbacks: null
  fast_dev_run: false
  max_epochs: 800
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: 1.0
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 1
  log_every_n_steps: 10
  enable_checkpointing: true
  enable_progress_bar: null
  enable_model_summary: null
  gradient_clip_val: 2
  gradient_clip_algorithm: null
  deterministic: false
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: [DEFAULT_ROOT_DIR]
f1_checkpoint:
  dirpath: null
  filename: f1-{epoch}-{step}
  monitor: metrics/f1
  verbose: false
  save_last: false
  save_top_k: 2
  save_weights_only: false
  mode: max
  auto_insert_metric_name: true
  every_n_train_steps: null
  train_time_interval: null
  every_n_epochs: 1
  save_on_train_epoch_end: null
f1_l4_checkpoint:
  dirpath: null
  filename: f1_l4-{epoch}-{step}
  monitor: metrics/f1_l4
  verbose: false
  save_last: false
  save_top_k: 2
  save_weights_only: false
  mode: max
  auto_insert_metric_name: true
  every_n_train_steps: null
  train_time_interval: null
  every_n_epochs: 1
  save_on_train_epoch_end: null
checkpoint_final:
  dirpath: null
  filename: final-{epoch}-{step}
  monitor: null
  verbose: true
  save_last: false
  save_top_k: 1
  save_weights_only: false
  mode: min
  auto_insert_metric_name: true
  every_n_train_steps: null
  train_time_interval: null
  every_n_epochs: 1
  save_on_train_epoch_end: true
early_stopping:
  monitor: metrics/f1
  min_delta: 0.0
  patience: 80
  verbose: false
  mode: max
  strict: true
  check_finite: true
  stopping_threshold: null
  divergence_threshold: null
  check_on_train_epoch_end: null
  log_rank_zero_only: false
ckpt_path: [CKPT]
data:
  class_path: efficient_kws.data_module.KWSDataMod
  init_args:
    train_info:
      - name: mls
        root: [MLS_ROOT]
        kw_type: all
    val_info:
      - name: acl
        root: [ACL_ROOT]
        kw_type: tts
    test_info:
      name: acl
      root: [ACL_ROOT]
      kw_type: tts
    test_split: test
    num_workers: 6
    hotwords_per_group: 50
    whisper_ckpt: openai/whisper-large-v2
model:
  class_path: efficient_kws.model.KWSModel
  init_args:
    num_domains: 12
    sampling: random
    resample_every_epoch: true
    kw_type: all
    kw_p: 0.5
    features_size:
      - 150
      - 1500
    learn_features: true
    load_embeddings: true
    n_layers: 3
    pad_long_before_resize: true
    kws_whisper_ckpt: openai/whisper-large-v2
    embedding_dim: 1280
    features_with_conv: false
    features_with_attn: false
    frames_conv: true
    proj_mlp: true
    proj_mlp_units: 64
    batch_size: 40
    accumulate_grad_batches: 32
    learning_rate: 1.0e-04
    learning_rate_sru: 1.0e-04
    warmup_proportion: 0.0
    features_lr: 5.0e-05
    classifier_lr: 5.0e-05
    lr_step: 5000
    weight_decay: 0.0
    beta_1: 0.9
    beta_2: 0.99
    sru_ctx_window_kwd: 150
    sru_chunk_size_kwd: 10
    sru_latent_variables_kwd: 300
    sru_ctx_window_utt: 1500
    sru_chunk_size_utt: 10
    sru_latent_variables_utt: 300
    condensed_dimension: frames
    resnet_version: resnet-50
    threshold: [THRESHOLD]
